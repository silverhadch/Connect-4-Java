name: Build & Release

on:
  push:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: mvn --batch-mode package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: linux-jar
          path: target/VierGewinnt.jar

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: mvn --batch-mode package

      # jpackage is bundled with JDK 17 — no extra tools needed
      # Produces a self-contained .exe with a bundled JRE inside
      - name: Package as Windows exe (jpackage)
        shell: pwsh
        run: |
          jpackage `
            --input target `
            --name VierGewinnt `
            --main-jar VierGewinnt.jar `
            --main-class Spielraum `
            --type exe `
            --win-console `
            --dest target/installer `
            --app-version 1.0.0

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: target/installer/VierGewinnt-1.0.0.exe

  release:
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Download Linux jar
        uses: actions/download-artifact@v4
        with:
          name: linux-jar
          path: dist/

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Build ${{ steps.sha.outputs.short }}"
          body: |
            Automated build from commit `${{ github.sha }}`

            > ${{ github.event.head_commit.message }}

            | File | Platform | Notes |
            |------|----------|-------|
            | `VierGewinnt.jar` | Linux / macOS | Requires Java 17 — `java -jar VierGewinnt.jar` |
            | `VierGewinnt-1.0.0.exe` | Windows | Bundled JRE, no Java install needed |
          files: dist/*
          prerelease: true
